<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script  src="simulador.js"></script>
</head>
<body>

<header class="topbar">
    <img src="logo1.jpg" class="logo left">

    <h1>Simulador de Crédito</h1>

    <img src="logo2.jpg.png" class="logo right">
</header>

<main class="container">

    <section class="panel">
        <h2>Datos financieros</h2>

        <div class="campo">
            <label>Ingresos</label>
            <input type="text" id="txtIngresos" onkeypress="bloquearNegativos(event)" onblur="validarIngresos()">
<small id="errIngresos" class="error"></small>
        </div>

        <div class="campo">
            <label>Arriendo</label>
            <input type="text" id="txtEgresos" onkeypress="bloquearNegativos(event)" onblur="validarEgresos()">
<small id="errEgresos" class="error"></small>
        </div>





<div class="campo">
            <label>Alimentacion</label>
            <input type="text" id="txtEgresos1" onkeypress="bloquearNegativos(event)"  onblur="validarEgresos()">
<small id="errEgresos" class="error"></small>
        </div>

<div class="campo">
            <label>Varios</label>
            <input type="text" id="txtEgresos2"  onkeypress="bloquearNegativos(event)" onblur="validarEgresos()">
<small id="errEgresos" class="error"></small>
        </div>   
        
        
        <div class="fila">
            <span>VALOR TOTAL DEL GASTO</span>
            <span id="spnTotalGastos"></span>
        </div>





        <h2>Solicitud de crédito</h2>

        <div class="campo">
            <label>Monto</label>
            <input type="text" id="txtMonto"  onkeypress="bloquearNegativos(event)" onblur="validarMonto()">
<small id="errMonto" class="error"></small>
        </div>

        <div class="campo">
            <label>Plazo en años</label>
            <input type="text" id="txtPlazo" onkeypress="bloquearNegativos(event)"  onblur="validarPlazo()">
<small id="errPlazo" class="error"></small>
        </div>

        <div class="campo">
            <label>Tasa de interés (%)</label>
            <input type="text" id="txtTasaInteres" onkeypress="bloquearNegativos(event)" onblur="validarTasa()">
<small id="errTasa" class="error"></small>
        </div>

        <button id="btnCalcularCredito" onclick="calcular()">Calcular crédito</button>
    </section>

    <section class="panel resultados">

        <h2>Resumen</h2>

        <div class="fila">
            <span>Disponible</span>
            <span id="spnDisponible"></span>
        </div>

        <div class="fila">
            <span>Capacidad de pago</span>
            <span id="spnCapacidadPago"></span>
        </div>

        <div class="fila">
            <span>Interés</span>
            <span id="spnInteresPagar"></span>
        </div>

        <div class="fila">
            <span>Total préstamo</span>
            <span id="spnTotalPrestamo"></span>
        </div>

        <div class="fila">
            <span>Cuota mensual</span>
            <span id="spnCuotaMensual"></span>
        </div>

        <div class="estado-box">
            <span id="spnEstadoCredito">ANALIZANDO...</span>
        </div>

    </section>

    <p class="nota">
        Este simulador es informativo y no representa una aprobación de crédito.
    </p>

</main>

</body>
</html>
